<div class="min-h-screen bg-[var(--hyper-gradient-bg)] text-[var(--hyper-text)]">
  <div class="relative mx-auto min-h-screen max-w-[420px] overflow-hidden bg-[#090A0F] shadow-[0_0_80px_rgba(12,10,30,0.8)]">
    <div class="pointer-events-none absolute inset-0 opacity-90">
      <div class="absolute inset-x-0 top-0 h-56 bg-[radial-gradient(circle_at_top,rgba(123,63,242,0.45),transparent_62%)]"></div>
      <div class="absolute -left-16 top-44 h-64 w-64 rounded-full bg-[radial-gradient(circle,rgba(28,25,103,0.5),transparent_70%)] blur-3xl"></div>
      <div class="absolute -right-20 bottom-24 h-64 w-64 rounded-full bg-[radial-gradient(circle,rgba(192,38,211,0.24),transparent_72%)] blur-3xl"></div>
      <div class="absolute inset-0 bg-[linear-gradient(180deg,rgba(9,10,15,0.84)_0%,rgba(9,10,15,0.18)_20%,rgba(9,10,15,0.22)_72%,rgba(9,10,15,0.95)_100%)]"></div>
    </div>

    <div class="relative flex min-h-screen flex-col">
      <div class="sticky top-0 z-30 border-b border-white/10 bg-[rgba(10,10,15,0.72)] px-5 pb-3 pt-4 backdrop-blur-xl">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="flex h-11 w-11 items-center justify-center rounded-2xl border border-[rgba(123,63,242,0.35)] bg-[linear-gradient(180deg,rgba(123,63,242,0.24),rgba(123,63,242,0.08))] shadow-[0_0_18px_rgba(123,63,242,0.28)]">
              <div class="grid h-6 w-6 grid-cols-2 gap-1">
                <span class="rounded-sm bg-[var(--hyper-purple)]"></span>
                <span class="rounded-sm bg-[var(--hyper-magenta)]"></span>
                <span class="rounded-sm bg-[var(--hyper-periwinkle)]"></span>
                <span class="rounded-sm bg-[var(--hyper-purple)]"></span>
              </div>
            </div>
            <div>
              <p class="text-[10px] uppercase tracking-[0.22em] text-[var(--hyper-text-tertiary)]">Hyperscaler</p>
              <p class="text-[15px] font-semibold tracking-[-0.02em] text-white">Asset Hub</p>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <button class="flex h-10 w-10 items-center justify-center rounded-full border border-white/10 bg-white/5 text-[var(--hyper-text-secondary)]">
              <span class="sr-only">Search</span>
              <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7"></circle>
                <path d="m20 20-3.5-3.5"></path>
              </svg>
            </button>
            <button class="flex h-10 w-10 items-center justify-center rounded-full border border-white/10 bg-white/5 text-[var(--hyper-text-secondary)]">
              <span class="sr-only">Menu</span>
              <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                <path d="M4 7h16"></path>
                <path d="M4 12h16"></path>
                <path d="M4 17h10"></path>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <main class="relative flex-1 px-4 pb-8 pt-4">
        {{page-content}}
      </main>
    </div>
  </div>
</div>
